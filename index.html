<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 Математика — это весело!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff9f0;
    --primary: #ff6b6b;
    --secondary: #ffd93d;
    --accent: #6bcb77;
    --blue: #4d96ff;
    --purple: #c77dff;
    --card: #ffffff;
    --shadow: 0 8px 30px rgba(0,0,0,0.12);
    --radius: 24px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(circle at 20% 20%, #ffe5e5 0%, transparent 40%),
                      radial-gradient(circle at 80% 80%, #e5f0ff 0%, transparent 40%),
                      radial-gradient(circle at 50% 50%, #fff5d6 0%, transparent 60%);
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--primary);
    text-align: center;
    margin: 20px 0 10px;
    text-shadow: 3px 3px 0 #ffb3b3;
    letter-spacing: 1px;
  }

  .stars-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    font-size: 1.8rem;
    min-height: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .star { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes popIn {
    from { transform: scale(0) rotate(-20deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* MODE SELECTOR */
  .mode-selector {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 30px;
  }

  .mode-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    padding: 14px 28px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    color: white;
    position: relative;
    top: 0;
  }
  .mode-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 0 rgba(0,0,0,0.15); }
  .mode-btn:active { top: 4px; box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  .mode-btn.active { outline: 4px solid #333; outline-offset: 3px; }

  .mode-btn.plus  { background: var(--accent); }
  .mode-btn.minus { background: var(--primary); }
  .mode-btn.mult  { background: var(--purple); }

  /* GAME CARD */
  .game-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 50px;
    text-align: center;
    width: 100%;
    max-width: 480px;
    position: relative;
    overflow: hidden;
  }

  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--blue), var(--purple));
  }

  .score-row {
    display: flex;
    justify-content: space-between;
    font-weight: 900;
    font-size: 1rem;
    color: #999;
    margin-bottom: 30px;
  }
  .score-row span { color: #333; }

  .question {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(3rem, 10vw, 5rem);
    color: #2d2d2d;
    margin: 10px 0 30px;
    line-height: 1.1;
    transition: transform 0.3s;
  }
  .question.shake {
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-10px) rotate(-2deg); }
    40% { transform: translateX(10px) rotate(2deg); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }

  /* ANSWER GRID */
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }

  .ans-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    padding: 20px;
    border: 3px solid #eee;
    border-radius: 18px;
    background: #fafafa;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s, border-color 0.15s;
    box-shadow: 0 4px 0 #ddd;
    position: relative;
    top: 0;
    color: #333;
  }
  .ans-btn:hover {
    transform: translateY(-3px);
    background: #f0f8ff;
    border-color: var(--blue);
    box-shadow: 0 7px 0 #c5d8f0;
  }
  .ans-btn:active { top: 3px; box-shadow: 0 1px 0 #ddd; }
  .ans-btn.correct {
    background: #d4f5dc;
    border-color: var(--accent);
    box-shadow: 0 4px 0 #a8e6b0;
    animation: correctBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .ans-btn.wrong {
    background: #fde8e8;
    border-color: var(--primary);
    box-shadow: 0 4px 0 #f5b3b3;
  }
  @keyframes correctBounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  /* FEEDBACK */
  .feedback {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    height: 36px;
    line-height: 36px;
    transition: opacity 0.3s;
  }
  .feedback.good { color: var(--accent); }
  .feedback.bad  { color: var(--primary); }

  /* CONFETTI */
  .confetti-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 100;
  }
  .confetti-piece {
    position: absolute;
    width: 12px;
    height: 12px;
    top: -20px;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* LEVEL BADGE */
  .level-badge {
    position: absolute;
    top: 16px;
    right: 20px;
    background: var(--secondary);
    color: #333;
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    padding: 4px 12px;
    border-radius: 50px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .streak {
    font-size: 0.9rem;
    color: #aaa;
    margin-top: 6px;
    min-height: 22px;
  }
  .streak.fire { color: #ff8c00; font-weight: 900; }

  footer {
    margin-top: 30px;
    color: #ccc;
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<h1>🧮 Математика!</h1>

<div class="stars-bar" id="starsBar"></div>

<div class="mode-selector">
  <button class="mode-btn plus active" onclick="setMode('plus')">➕ Плюс</button>
  <button class="mode-btn minus" onclick="setMode('minus')">➖ Минус</button>
  <button class="mode-btn mult" onclick="setMode('mult')">✖️ Умножение</button>
</div>

<div class="game-card">
  <div class="level-badge" id="levelBadge">⭐ Уровень 1</div>
  <div class="score-row">
    <div>✅ Правильно: <span id="scoreCorrect">0</span></div>
    <div>❌ Ошибки: <span id="scoreWrong">0</span></div>
  </div>
  <div class="question" id="question">3 + 4 = ?</div>
  <div class="answers" id="answers"></div>
  <div class="feedback" id="feedback"></div>
  <div class="streak" id="streak"></div>
</div>

<div class="confetti-wrap" id="confettiWrap"></div>

<footer>Сделано с ❤️ для маленьких математиков</footer>

<script>
  let mode = 'plus';
  let correct = 0, wrong = 0, streak = 0;
  let answer = 0;
  let canAnswer = true;
  let stars = 0;

  const PRAISE = ['Молодец! 🎉','Супер! 🌟','Отлично! 🚀','Умница! 💪','Класс! 🎊','Ура! 🥳'];
  const OOPS   = ['Ой, не то 😅','Попробуй ещё!','Почти! 🤔','Не сдавайся! 💫'];
  const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f43','#54a0ff'];

  function getLevel() {
    if (correct < 5)  return { n: 1, max: 10,  label: '⭐ Уровень 1' };
    if (correct < 15) return { n: 2, max: 20,  label: '⭐⭐ Уровень 2' };
    return              { n: 3, max: 50,  label: '⭐⭐⭐ Уровень 3' };
  }

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function generateQuestion() {
    canAnswer = true;
    const lv = getLevel();
    document.getElementById('levelBadge').textContent = lv.label;

    let a, b, op, display;
    if (mode === 'plus') {
      a = rand(0, lv.max); b = rand(0, lv.max - a);
      answer = a + b; op = '+'; display = `${a} + ${b} = ?`;
    } else if (mode === 'minus') {
      a = rand(0, lv.max); b = rand(0, a);
      answer = a - b; op = '−'; display = `${a} − ${b} = ?`;
    } else {
      a = rand(1, lv.n === 1 ? 3 : lv.n === 2 ? 5 : 9);
      b = rand(1, lv.n === 1 ? 3 : lv.n === 2 ? 5 : 9);
      answer = a * b; op = '×'; display = `${a} × ${b} = ?`;
    }

    document.getElementById('question').textContent = display;
    document.getElementById('question').classList.remove('shake');

    // Generate wrong answers
    const options = new Set([answer]);
    while (options.size < 4) {
      let fake = answer + rand(-5, 5);
      if (fake >= 0 && fake !== answer) options.add(fake);
    }
    const arr = [...options].sort(() => Math.random() - 0.5);

    const container = document.getElementById('answers');
    container.innerHTML = '';
    arr.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.textContent = opt;
      btn.onclick = () => checkAnswer(opt, btn);
      container.appendChild(btn);
    });

    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
  }

  function checkAnswer(val, btn) {
    if (!canAnswer) return;
    canAnswer = false;

    if (val === answer) {
      correct++;
      streak++;
      stars++;
      btn.classList.add('correct');
      document.getElementById('scoreCorrect').textContent = correct;
      showFeedback(PRAISE[Math.floor(Math.random() * PRAISE.length)], 'good');
      updateStreak();
      addStar();
      if (streak % 5 === 0) launchConfetti();
      setTimeout(generateQuestion, 900);
    } else {
      wrong++;
      streak = 0;
      btn.classList.add('wrong');
      document.getElementById('scoreWrong').textContent = wrong;
      document.getElementById('question').classList.add('shake');
      showFeedback(OOPS[Math.floor(Math.random() * OOPS.length)], 'bad');
      updateStreak();
      // Highlight correct
      setTimeout(() => {
        document.querySelectorAll('.ans-btn').forEach(b => {
          if (parseInt(b.textContent) === answer) b.classList.add('correct');
        });
      }, 400);
      setTimeout(generateQuestion, 1400);
    }
  }

  function showFeedback(msg, cls) {
    const el = document.getElementById('feedback');
    el.textContent = msg;
    el.className = 'feedback ' + cls;
  }

  function updateStreak() {
    const el = document.getElementById('streak');
    if (streak >= 3) {
      el.textContent = `🔥 Серия: ${streak} подряд!`;
      el.className = 'streak fire';
    } else {
      el.textContent = '';
      el.className = 'streak';
    }
  }

  function addStar() {
    const bar = document.getElementById('starsBar');
    if (bar.children.length >= 20) bar.innerHTML = '';
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = '⭐';
    bar.appendChild(s);
  }

  function launchConfetti() {
    const wrap = document.getElementById('confettiWrap');
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = rand(0, 100) + '%';
      p.style.background = COLORS[rand(0, COLORS.length - 1)];
      p.style.width  = rand(8, 16) + 'px';
      p.style.height = rand(8, 16) + 'px';
      p.style.borderRadius = rand(0, 1) ? '50%' : '2px';
      p.style.animationDuration = rand(1200, 2400) + 'ms';
      p.style.animationDelay = rand(0, 600) + 'ms';
      wrap.appendChild(p);
      setTimeout(() => p.remove(), 3000);
    }
  }

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.mode-btn.' + (m === 'plus' ? 'plus' : m === 'minus' ? 'minus' : 'mult')).classList.add('active');
    correct = 0; wrong = 0; streak = 0;
    document.getElementById('scoreCorrect').textContent = 0;
    document.getElementById('scoreWrong').textContent = 0;
    document.getElementById('starsBar').innerHTML = '';
    updateStreak();
    generateQuestion();
  }

  generateQuestion();
</script>
</body>
</html>
