<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 Математика — это весело!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff9f0;
    --primary: #ff6b6b;
    --secondary: #ffd93d;
    --accent: #6bcb77;
    --blue: #4d96ff;
    --purple: #c77dff;
    --card: #ffffff;
    --shadow: 0 8px 30px rgba(0,0,0,0.12);
    --radius: 24px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(circle at 20% 20%, #ffe5e5 0%, transparent 40%),
                      radial-gradient(circle at 80% 80%, #e5f0ff 0%, transparent 40%),
                      radial-gradient(circle at 50% 50%, #fff5d6 0%, transparent 60%);
  }
  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--primary);
    text-align: center;
    margin: 20px 0 10px;
    text-shadow: 3px 3px 0 #ffb3b3;
  }

  .progress-wrap {
    width: 100%;
    max-width: 620px;
    margin-bottom: 12px;
  }
  .progress-label {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #888;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar-bg {
    background: #eee;
    border-radius: 50px;
    height: 18px;
    overflow: hidden;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.08);
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--accent), var(--blue));
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .level-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .lv-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    padding: 8px 20px;
    border: 3px solid #ddd;
    border-radius: 50px;
    background: #fff;
    cursor: pointer;
    color: #888;
    transition: all 0.15s;
  }
  .lv-btn:hover { border-color: var(--blue); color: var(--blue); }
  .lv-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; box-shadow: 0 4px 12px rgba(77,150,255,0.4); }

  .mode-selector {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  .mode-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    padding: 12px 24px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    color: white;
    position: relative; top: 0;
  }
  .mode-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 0 rgba(0,0,0,0.15); }
  .mode-btn:active { top: 4px; box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  .mode-btn.active { outline: 4px solid #333; outline-offset: 3px; }
  .mode-btn.plus  { background: var(--accent); }
  .mode-btn.minus { background: var(--primary); }
  .mode-btn.mult  { background: var(--purple); }
  .mode-btn.div   { background: #ff9f43; }

  .game-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 36px 44px;
    text-align: center;
    width: 100%;
    max-width: 620px;
    position: relative;
    overflow: hidden;
  }
  .game-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--blue), var(--purple));
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }
  .score-info { font-weight: 900; font-size: 0.95rem; color: #aaa; }
  .score-info span { color: #333; }

  .start-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    padding: 8px 20px;
    border: none;
    border-radius: 50px;
    background: var(--secondary);
    color: #333;
    cursor: pointer;
    box-shadow: 0 4px 0 #e6c200;
    transition: transform 0.1s;
    position: relative; top: 0;
  }
  .start-btn:hover { transform: translateY(-2px); }
  .start-btn:active { top: 3px; box-shadow: 0 1px 0 #e6c200; }

  .question {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 9vw, 4.5rem);
    color: #2d2d2d;
    margin: 6px 0 26px;
    line-height: 1.1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .question.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-10px) rotate(-2deg); }
    40% { transform: translateX(10px) rotate(2deg); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(8px); }
  }

  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .ans-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.9rem;
    padding: 18px;
    border: 3px solid #eee;
    border-radius: 18px;
    background: #fafafa;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    box-shadow: 0 4px 0 #ddd;
    position: relative; top: 0;
    color: #333;
  }
  .ans-btn:hover { transform: translateY(-3px); background: #f0f8ff; border-color: var(--blue); }
  .ans-btn:active { top: 3px; box-shadow: 0 1px 0 #ddd; }
  .ans-btn.correct { background: #d4f5dc; border-color: var(--accent); animation: correctBounce 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .ans-btn.wrong   { background: #fde8e8; border-color: var(--primary); }
  @keyframes correctBounce {
    0% { transform: scale(1); } 50% { transform: scale(1.12); } 100% { transform: scale(1); }
  }

  .feedback { font-family: 'Fredoka One', cursive; font-size: 1.4rem; height: 32px; line-height: 32px; }
  .feedback.good { color: var(--accent); }
  .feedback.bad  { color: var(--primary); }
  .streak { font-size: 0.9rem; color: #aaa; margin-top: 6px; min-height: 22px; }
  .streak.fire { color: #ff8c00; font-weight: 900; }

  .win-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .win-overlay.show { display: flex; }
  .win-box {
    background: white;
    border-radius: 32px;
    padding: 50px 60px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .win-emoji { font-size: 5rem; display: block; margin-bottom: 10px; }
  .win-title { font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: var(--primary); margin-bottom: 8px; }
  .win-sub { font-size: 1.1rem; color: #888; margin-bottom: 24px; }
  .win-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    padding: 14px 36px;
    border: none;
    border-radius: 50px;
    background: var(--accent);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 0 #4aa858;
    transition: transform 0.1s;
  }
  .win-btn:hover { transform: translateY(-3px); }

  .confetti-wrap {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; overflow: hidden; z-index: 300;
  }
  .confetti-piece {
    position: absolute; top: -20px; border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .hearts-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
    font-size: 2rem;
  }
  .heart {
    transition: transform 0.3s;
    display: inline-block;
  }
  .heart.lost {
    filter: grayscale(1) opacity(0.3);
    transform: scale(0.8);
  }
  .heart.shake-heart { animation: heartShake 0.4s ease; }
  @keyframes heartShake {
    0%,100% { transform: scale(1); }
    30% { transform: scale(1.4) rotate(-10deg); }
    60% { transform: scale(0.8) rotate(10deg); }
  }

  /* GAME OVER OVERLAY */
  .gameover-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .gameover-overlay.show { display: flex; }
  .gameover-box {
    background: white;
    border-radius: 32px;
    padding: 50px 60px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .gameover-emoji { font-size: 5rem; display: block; margin-bottom: 10px; }
  .gameover-title { font-family: 'Fredoka One', cursive; font-size: 2.5rem; color: var(--primary); margin-bottom: 8px; }
  .gameover-sub { font-size: 1.1rem; color: #888; margin-bottom: 24px; }
  .gameover-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    padding: 14px 36px;
    border: none;
    border-radius: 50px;
    background: var(--primary);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 0 #c0392b;
    transition: transform 0.1s;
  }
  .gameover-btn:hover { transform: translateY(-3px); }
  footer { margin-top: 24px; color: #ccc; font-size: 0.8rem; }
</style>
</head>
<body>

<h1>🧮 Математика!</h1>

<div class="progress-wrap">
  <div class="progress-label">
    <span>🏆 Правильных: <span id="winCount">0</span> / 10</span>
    <span id="levelLabel">⭐ Уровень 1</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="level-selector">
  <button class="lv-btn active" onclick="setLevel(1)">⭐ Уровень 1</button>
  <button class="lv-btn" onclick="setLevel(2)">⭐⭐ Уровень 2</button>
  <button class="lv-btn" onclick="setLevel(3)">⭐⭐⭐ Уровень 3</button>
</div>

<div class="mode-selector">
  <button class="mode-btn plus active" onclick="setMode('plus')">➕ Плюс</button>
  <button class="mode-btn minus" onclick="setMode('minus')">➖ Минус</button>
  <button class="mode-btn mult" onclick="setMode('mult')">✖️ Умножение</button>
  <button class="mode-btn div" onclick="setMode('div')">➗ Деление</button>
</div>

<div class="game-card">
  <div class="top-row">
    <div class="score-info">✅ <span id="scoreCorrect">0</span> &nbsp; ❌ <span id="scoreWrong">0</span></div>
    <button class="start-btn" onclick="resetGame()">🔄 Старт</button>
  </div>
  <div class="hearts-row" id="heartsRow">❤️❤️❤️</div>
  <div class="question" id="question"></div>
  <div class="answers" id="answers"></div>
  <div class="feedback" id="feedback"></div>
  <div class="streak" id="streak"></div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <span class="win-emoji">🏆</span>
    <div class="win-title">Ты победил!</div>
    <div class="win-sub" id="winSub">10 правильных ответов!</div>
    <button class="win-btn" onclick="closeWin()">🚀 Играть снова!</button>
  </div>
</div>


<div class="gameover-overlay" id="gameoverOverlay">
  <div class="gameover-box">
    <span class="gameover-emoji">💔</span>
    <div class="gameover-title">Не получилось...</div>
    <div class="gameover-sub" id="gameoverSub">Правильных ответов: 0</div>
    <button class="gameover-btn" onclick="closeGameover()">🔄 Попробовать снова!</button>
  </div>
</div>
<div class="confetti-wrap" id="confettiWrap"></div>
<footer>Сделано с ❤️ для маленьких математиков</footer>

<script>
  let mode = 'plus', level = 1;
  let correct = 0, wrong = 0, streak = 0, winCount = 0, lives = 3;
  let answer = 0, canAnswer = true;

  const PRAISE = ['Молодец! 🎉','Супер! 🌟','Отлично! 🚀','Умница! 💪','Класс! 🎊','Ура! 🥳'];
  const OOPS   = ['Ой, не то 😅','Попробуй ещё! 💫','Почти! 🤔','Не сдавайся! 💪'];
  const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f43','#54a0ff'];
  const LEVELS = {
    1: { plusMax: 10,   multA: 3,  multB: 3,  divMax: 5  },
    2: { plusMax: 100,  multA: 10, multB: 10, divMax: 10 },
    3: { plusMax: 1000, multA: 20, multB: 20, divMax: 20 },
  };
  const LV_NAMES = { 1: '⭐ Уровень 1', 2: '⭐⭐ Уровень 2', 3: '⭐⭐⭐ Уровень 3' };

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

  function renderHearts() {
    const row = document.getElementById('heartsRow');
    row.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const h = document.createElement('span');
      h.className = 'heart' + (i >= lives ? ' lost' : '');
      h.textContent = i >= lives ? '🖤' : '❤️';
      row.appendChild(h);
    }
  }

  function setLevel(n) {
    level = n;
    document.querySelectorAll('.lv-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === n));
    document.getElementById('levelLabel').textContent = LV_NAMES[n];
    resetGame();
  }

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.mode-btn.' + (m === 'plus' ? 'plus' : m === 'minus' ? 'minus' : m === 'mult' ? 'mult' : 'div')).classList.add('active');
    // НЕ сбрасываем очки при смене режима
    generateQuestion();
  }

  function resetGame() {
    correct = 0; wrong = 0; streak = 0; winCount = 0; lives = 3;
    document.getElementById('scoreCorrect').textContent = 0;
    document.getElementById('scoreWrong').textContent = 0;
    document.getElementById('winCount').textContent = 0;
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('streak').textContent = '';
    document.getElementById('streak').className = 'streak';
    renderHearts();
    generateQuestion();
  }

  function generateQuestion() {
    canAnswer = true;
    const lv = LEVELS[level];
    let a, b, display;

    if (mode === 'plus') {
      a = rand(0, lv.plusMax); b = rand(0, lv.plusMax - a);
      answer = a + b; display = `${a} + ${b} = ?`;
    } else if (mode === 'minus') {
      a = rand(0, lv.plusMax); b = rand(0, a);
      answer = a - b; display = `${a} − ${b} = ?`;
    } else if (mode === 'mult') {
      a = rand(1, lv.multA); b = rand(1, lv.multB);
      answer = a * b; display = `${a} × ${b} = ?`;
    } else {
      // division: only whole results
      const divMax = lv.divMax;
      b = rand(2, divMax);
      const quotient = rand(1, divMax);
      a = b * quotient;
      answer = quotient;
      display = `${a} ÷ ${b} = ?`;
    }

    document.getElementById('question').textContent = display;
    document.getElementById('question').classList.remove('shake');

    const options = new Set([answer]);
    let attempts = 0;
    while (options.size < 4 && attempts++ < 200) {
      let offset = rand(1, Math.max(4, Math.floor(answer * 0.25) + 3));
      let fake = Math.random() < 0.5 ? answer + offset : answer - offset;
      if (fake >= 0 && fake !== answer) options.add(fake);
    }
    const arr = [...options].sort(() => Math.random() - 0.5);

    const container = document.getElementById('answers');
    container.innerHTML = '';
    arr.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.textContent = opt;
      btn.onclick = () => checkAnswer(opt, btn);
      container.appendChild(btn);
    });

    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
  }

  function checkAnswer(val, btn) {
    if (!canAnswer) return;
    canAnswer = false;

    if (val === answer) {
      correct++; streak++; winCount++;
      btn.classList.add('correct');
      document.getElementById('scoreCorrect').textContent = correct;
      document.getElementById('winCount').textContent = winCount;
      document.getElementById('progressFill').style.width = Math.min(winCount / 10 * 100, 100) + '%';
      showFeedback(PRAISE[Math.floor(Math.random() * PRAISE.length)], 'good');
      updateStreak();
      if (winCount >= 10) { launchConfetti(80); setTimeout(showWin, 600); return; }
      if (streak % 5 === 0) launchConfetti(40);
      setTimeout(generateQuestion, 800);
    } else {
      wrong++; streak = 0; lives--;
      btn.classList.add('wrong');
      document.getElementById('scoreWrong').textContent = wrong;
      document.getElementById('question').classList.add('shake');
      showFeedback(OOPS[Math.floor(Math.random() * OOPS.length)], 'bad');
      updateStreak();
      renderHearts();
      // shake the last lost heart
      const hearts = document.querySelectorAll('.heart');
      if (hearts[lives]) hearts[lives].classList.add('shake-heart');
      setTimeout(() => {
        document.querySelectorAll('.ans-btn').forEach(b => {
          if (Number(b.textContent) === answer) b.classList.add('correct');
        });
      }, 350);
      if (lives <= 0) {
        setTimeout(showGameover, 1300);
      } else {
        setTimeout(generateQuestion, 1300);
      }
    }
  }

  function showFeedback(msg, cls) {
    const el = document.getElementById('feedback');
    el.textContent = msg; el.className = 'feedback ' + cls;
  }

  function updateStreak() {
    const el = document.getElementById('streak');
    if (streak >= 3) { el.textContent = `🔥 Серия: ${streak} подряд!`; el.className = 'streak fire'; }
    else { el.textContent = ''; el.className = 'streak'; }
  }

  function showWin() {
    document.getElementById('winSub').textContent = LV_NAMES[level] + ' пройден! 10 правильных ответов! 🎉';
    document.getElementById('winOverlay').classList.add('show');
    launchConfetti(120);
  }

  function closeWin() {
    document.getElementById('winOverlay').classList.remove('show');
    resetGame();
  }

  function showGameover() {
    document.getElementById('gameoverSub').textContent = `Правильных ответов: ${correct} 🌟`;
    document.getElementById('gameoverOverlay').classList.add('show');
  }

  function closeGameover() {
    document.getElementById('gameoverOverlay').classList.remove('show');
    resetGame();
  }

  function launchConfetti(count) {
    const wrap = document.getElementById('confettiWrap');
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = rand(0, 100) + '%';
      p.style.background = COLORS[rand(0, COLORS.length - 1)];
      p.style.width = rand(8, 16) + 'px';
      p.style.height = rand(8, 16) + 'px';
      p.style.borderRadius = rand(0, 1) ? '50%' : '2px';
      p.style.animationDuration = rand(1200, 2600) + 'ms';
      p.style.animationDelay = rand(0, 800) + 'ms';
      wrap.appendChild(p);
      setTimeout(() => p.remove(), 3500);
    }
  }

  generateQuestion();
</script>
</body>
</html>
